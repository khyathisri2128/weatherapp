<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow — Real-Time Weather</title>
  <meta name="description" content="Search real-time weather for any city worldwide. Get temperature, country, and conditions instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --clr-bg-from: #0f0c29;
      --clr-bg-mid: #302b63;
      --clr-bg-to: #24243e;
      --clr-glass: rgba(255, 255, 255, 0.08);
      --clr-glass-border: rgba(255, 255, 255, 0.15);
      --clr-glass-hover: rgba(255, 255, 255, 0.13);
      --clr-accent: #7c3aed;
      --clr-accent2: #a78bfa;
      --clr-accent-glow: rgba(124, 58, 237, 0.45);
      --clr-text: #f1f5f9;
      --clr-muted: #94a3b8;
      --clr-card-from: rgba(124, 58, 237, 0.15);
      --clr-card-to:   rgba(167, 139, 250, 0.08);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.35);
      --transition: 0.3s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--clr-bg-from), var(--clr-bg-mid), var(--clr-bg-to));
      background-attachment: fixed;
      color: var(--clr-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(24px, 5vw, 60px) clamp(16px, 4vw, 40px);
      position: relative;
      overflow-x: hidden;
    }

    /* animated blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.35), transparent 70%);
      top: -120px; left: -120px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.25), transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: 4s;
    }

    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ── Layout wrapper ── */
    .app-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .header .logo {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .header .logo span {
      display: inline-block;
      margin-right: 8px;
      -webkit-text-fill-color: initial;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
    }

    .header .subtitle {
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      color: var(--clr-muted);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* ── Search card ── */
    .search-card {
      width: 100%;
      background: var(--clr-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--clr-glass-border);
      border-radius: var(--radius);
      padding: clamp(20px, 4vw, 32px);
      box-shadow: var(--shadow-glass);
    }

    #form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    #form label {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }

    #city {
      flex: 1 1 200px;
      min-width: 0;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--clr-glass-border);
      background: rgba(255,255,255,0.06);
      color: var(--clr-text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #city::placeholder { color: var(--clr-muted); }

    #city:focus {
      border-color: var(--clr-accent2);
      box-shadow: 0 0 0 3px var(--clr-accent-glow);
    }

    .search-btn {
      flex: 0 0 auto;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--clr-accent), #6d28d9);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.3px;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      box-shadow: 0 4px 18px rgba(124, 58, 237, 0.45);
      white-space: nowrap;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(124, 58, 237, 0.65);
    }

    .search-btn:active { transform: translateY(0); }

    .search-btn.loading { opacity: 0.7; pointer-events: none; }

    /* spinning icon */
    .search-btn svg { transition: transform 0.4s; }
    .search-btn:hover svg { transform: rotate(20deg); }

    /* ── Error banner ── */
    #error-banner {
      width: 100%;
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 0.9rem;
      animation: slideDown 0.3s ease;
    }
    #error-banner.visible { display: flex; }

    /* ── Results grid ── */
    #result-container {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: 18px;
    }

    /* ── Weather card ── */
    .card {
      background: linear-gradient(135deg, var(--clr-card-from), var(--clr-card-to));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--clr-glass-border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-glass);
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.2), transparent 70%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-icon {
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    .card-city {
      flex: 1;
    }

    .card-city-name {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--clr-text);
    }

    .card-city-country {
      font-size: 0.78rem;
      color: var(--clr-accent2);
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .card-divider {
      height: 1px;
      background: var(--clr-glass-border);
      border-radius: 2px;
    }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--clr-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--clr-text);
    }

    .temp-badge {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(96,165,250,0.2));
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .temp-main {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-feel {
      font-size: 0.78rem;
      color: var(--clr-muted);
    }

    .card-footer {
      font-size: 0.72rem;
      color: var(--clr-muted);
      text-align: right;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: var(--clr-muted);
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ── Animations ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 4px; }

    /* ── Responsive tweaks ── */
    @media (max-width: 480px) {
      #form { flex-direction: column; }
      .search-btn { width: 100%; justify-content: center; }
      #result-container { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app-wrapper">

    <!-- Header -->
    <header class="header">
      <h1 class="logo"><span>🌤️</span>WeatherNow</h1>
      <p class="subtitle">Real‑time weather for any city in the world</p>
    </header>

    <!-- Search -->
    <section class="search-card" aria-label="City search">
      <form id="form" autocomplete="off">
        <label for="city">City name</label>
        <input type="text" id="city" placeholder="e.g. London, Tokyo, New York…" aria-label="Enter city name" />
        <button type="submit" class="search-btn" id="search-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </form>

      <!-- Error -->
      <div id="error-banner" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text">City not found. Please check the spelling and try again.</span>
      </div>
    </section>

    <!-- Results -->
    <main id="result-container" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Search for a city above to see<br />real-time weather information.</p>
      </div>
    </main>

  </div>

  <script>
    const form       = document.getElementById('form');
    const cityInput  = document.getElementById('city');
    const result     = document.getElementById('result-container');
    const searchBtn  = document.getElementById('search-btn');
    const errorBanner= document.getElementById('error-banner');
    const errorText  = document.getElementById('error-text');
    const apikey     = 'b0b65ed59debabf554475a654b2dc64a';

    // Map weather condition codes → emoji
    function weatherIcon(id) {
      if (id >= 200 && id < 300) return '⛈️';
      if (id >= 300 && id < 400) return '🌧️';
      if (id >= 500 && id < 600) return '🌦️';
      if (id >= 600 && id < 700) return '❄️';
      if (id >= 700 && id < 800) return '🌫️';
      if (id === 800)             return '☀️';
      if (id === 801)             return '🌤️';
      if (id === 802)             return '⛅';
      if (id >= 803)              return '☁️';
      return '🌡️';
    }

    function hideError() {
      errorBanner.classList.remove('visible');
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorBanner.classList.add('visible');
    }

    function setLoading(on) {
      if (on) {
        searchBtn.classList.add('loading');
        searchBtn.textContent = 'Searching…';
      } else {
        searchBtn.classList.remove('loading');
        searchBtn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search`;
      }
    }

    function display(data) {
      // clear empty state on first card
      const emptyState = result.querySelector('.empty-state');
      if (emptyState) emptyState.remove();

      const icon    = weatherIcon(data.weatherId);
      const time    = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const feelStr = data.feelsLike !== undefined ? `${data.feelsLike}°C` : '—';
      const desc    = data.description
        ? data.description.charAt(0).toUpperCase() + data.description.slice(1)
        : '';
      const humidity = data.humidity !== undefined ? `${data.humidity}%` : '—';
      const wind     = data.wind     !== undefined ? `${data.wind} m/s` : '—';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon">${icon}</div>
          <div class="card-city">
            <div class="card-city-name">${data.name}</div>
            <div class="card-city-country">${data.country}</div>
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="card-stats">
          <div class="temp-badge">
            <div>
              <div class="stat-label">Temperature</div>
              <div class="temp-main">${data.temp}°C</div>
              ${desc ? `<div class="temp-feel">${desc}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div class="stat-label">Feels like</div>
              <div class="stat-value">${feelStr}</div>
            </div>
          </div>
          <div class="stat">
            <span class="stat-label">💧 Humidity</span>
            <span class="stat-value">${humidity}</span>
          </div>
          <div class="stat">
            <span class="stat-label">💨 Wind</span>
            <span class="stat-value">${wind}</span>
          </div>
        </div>
        <div class="card-footer">Fetched at ${time}</div>
      `;

      result.prepend(card);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      hideError();

      const q = cityInput.value.trim();
      if (!q) {
        showError('Please enter a city name.');
        return;
      }

      setLoading(true);

      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(q)}&appid=${apikey}&units=metric`;

      fetch(url)
        .then(res => res.json())
        .then(res => {
          setLoading(false);
          if (res.cod === '404' || res.cod === 404) {
            showError(`"${q}" was not found. Please check the spelling and try again.`);
            return;
          }
          const { main, sys, name, weather, wind } = res;
          display({
            name,
            country:     sys.country,
            temp:        Math.round(main.temp),
            feelsLike:   Math.round(main.feels_like),
            humidity:    main.humidity,
            wind:        wind ? Math.round(wind.speed) : undefined,
            description: weather && weather[0] ? weather[0].description : '',
            weatherId:   weather && weather[0] ? weather[0].id : 800,
          });
          cityInput.value = '';
        })
        .catch(() => {
          setLoading(false);
          showError('Network error. Please check your connection and try again.');
        });
    });
  </script>
</body>

</html>
